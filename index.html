<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusForge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <h1>Focus Forge</h1>
    <p>Focus. Track. Improve</p>
    </header>
    <section>
    <h2>Daily Quote</h2>
    <p id="quote">Loading quote...</p>
    </section>
    <section>
    <h2>Today's Goals</h2>
    <input id="goalInput">
    <button id="addGoalBtn"></button>
    <ul id="goalList"></ul>
    </section>
    <div>
        <h3>Focus Timer</h3>
    </div>
    <div>
        <h3>Study Streak</h3>
    </div>
    <div>
        <h3>GitHub Insights</h3>
    </div>
    <script src="script.js"></script>
</body>
</html>
