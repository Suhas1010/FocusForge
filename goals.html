<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals | FocusForge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Goals</h1>
        <a href="index.html">← Back to Dashboard</a>
    </header>

    <main>

        <section>
            <h2>Add New Goal</h2>

            <input
                type="text"
                id="goalInput"
                placeholder="Enter a goal"
            >

            <button id="addGoalBtn">
                Add Goal
            </button>
        </section>

        <section>
            <h2>Active Goals</h2>

            <ul id="goalList">
            </ul>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
